<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title> </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* dvh = dynamic viewport height — corrige o bug do Safari mobile com a barra de endereço */
    body {
      height: 100dvh;
      min-height: -webkit-fill-available;
    }

    #foto {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    /* overlay invisível — clique/toque em qualquer lugar inicia a música */
    #hint { display: none; }

    /* Tela de "vire o celular" */
    #girar {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      color: white;
      font-family: sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
    }

    #girar .icone {
      font-size: 3.5rem;
      animation: spin 2.5s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #girar p {
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <img id="foto" src="foto.png" alt="">

  <div id="overlay">
    <div id="hint">▶ toque para começar</div>
  </div>

  <!-- Overlay de rotação (só aparece no celular em retrato) -->
  <div id="girar">
    <div class="icone">⟳</div>
    <p>Tournez votre téléphone</p>
  </div>

  <audio id="audio" loop></audio>

  <script>
    const musicas = [
      "musica1.mp3"
    ];

    const audio   = document.getElementById("audio");
    const overlay = document.getElementById("overlay");
    const hint    = document.getElementById("hint");
    const girar   = document.getElementById("girar");

    const escolhida = musicas[Math.floor(Math.random() * musicas.length)];
    audio.src = escolhida;

    // Detecta celular em retrato e mostra overlay de rotação
    function checarOrientacao() {
      const isMobile = navigator.maxTouchPoints > 0 || window.innerWidth <= 1024;
      const isRetrato = window.innerHeight > window.innerWidth;
      girar.style.display = (isMobile && isRetrato) ? "flex" : "none";
    }

    checarOrientacao();
    window.addEventListener("resize", checarOrientacao);

    // Tenta autoplay direto
    audio.play().catch(() => {});

    // Se bloqueado, qualquer toque/clique na página inicia a música
    function iniciar() {
      audio.play();
      overlay.style.display = "none";
      document.removeEventListener("click", iniciar);
      document.removeEventListener("touchstart", iniciar);
    }

    document.addEventListener("click", iniciar);
    document.addEventListener("touchstart", iniciar);

    audio.addEventListener("playing", () => {
      overlay.style.display = "none";
    });
  </script>

</body>
</html>
