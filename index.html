<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title> </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { height: -webkit-fill-available; }

    body {
      width: 100%;
      height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    /* Foto — horizontal: texto aparece em baixo */
    #foto {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center bottom;
      display: block;
    }

    /* Foto — vertical: olho direito centralizado */
    @media (orientation: portrait) {
      #foto {
        object-position: 72% 18%;
      }
    }

    /* Três zonas de clique invisíveis */
    #zones {
      position: fixed;
      inset: 0;
      display: flex;
      z-index: 10;
    }

    .zone { flex: 1; height: 100%; cursor: pointer; }

    /* Feedback visual rápido */
    .feedback {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.6rem;
      color: white;
      font-family: -apple-system, sans-serif;
      text-shadow: 0 2px 18px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.12s;
      pointer-events: none;
      z-index: 20;
    }

    #fb-prev { left: 14%; }
    #fb-play { left: 50%; transform: translate(-50%, -50%); }
    #fb-next { right: 14%; }

    /* Tutorial — primeira visita */
    #tutorial {
      position: fixed;
      inset: 0;
      display: flex;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #tutorial.visivel { opacity: 1; }

    .tuto {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(3px);
    }

    .tuto + .tuto { border-left: 1px solid rgba(255,255,255,0.12); }

    .tuto-icon {
      font-size: 1.8rem;
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, sans-serif;
    }

    .tuto-label {
      font-family: -apple-system, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    /* Tela de rotação (só na primeira visita) */
    #girar {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      color: white;
      font-family: -apple-system, sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #girar .icone {
      font-size: 3.5rem;
      animation: spin 2.5s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #girar p {
      font-size: 1.05rem;
      letter-spacing: 0.07em;
      opacity: 0.82;
    }
  </style>
</head>
<body>

  <img id="foto" src="foto.png" alt="">

  <div id="zones">
    <div class="zone" id="zone-prev"></div>
    <div class="zone" id="zone-play"></div>
    <div class="zone" id="zone-next"></div>
  </div>

  <div class="feedback" id="fb-prev"></div>
  <div class="feedback" id="fb-play"></div>
  <div class="feedback" id="fb-next"></div>

  <div id="tutorial">
    <div class="tuto">
      <div class="tuto-icon">⏮&#xFE0E;</div>
      <div class="tuto-label">Précédent</div>
    </div>
    <div class="tuto">
      <div class="tuto-icon">⏸&#xFE0E;</div>
      <div class="tuto-label">Pause</div>
    </div>
    <div class="tuto">
      <div class="tuto-icon">⏭&#xFE0E;</div>
      <div class="tuto-label">Suivant</div>
    </div>
  </div>

  <div id="girar">
    <div class="icone">↻&#xFE0E;</div>
    <p>Tournez votre téléphone</p>
  </div>

  <audio id="audio"></audio>

  <script>
    const musicas = [
      "musica1.mp3",
      "musica2.mp3",
      "musica3.mp3",
      "musica4.mp3",
      "musica5.mp3",
      "musica6.mp3"
    ];

    const audio    = document.getElementById("audio");
    const girar    = document.getElementById("girar");
    const tutorial = document.getElementById("tutorial");

    let indice         = 0;
    let tocando        = false;
    let primeiroClique = true;

    // ── Reprodução ─────────────────────────────────────────────────────────

    function carregarE(idx) {
      indice = ((idx % musicas.length) + musicas.length) % musicas.length;
      audio.src = musicas[indice];
      audio.play().then(() => { tocando = true; }).catch(() => {});
      syncMediaSession();
    }

    function proximo()  { flash("fb-next", "⏭︎"); carregarE(indice + 1); }
    function anterior() {
      flash("fb-prev", "⏮︎");
      if (audio.currentTime > 3) { audio.currentTime = 0; }
      else { carregarE(indice - 1); }
    }
    function pausePlay() {
      if (tocando) {
        audio.pause(); tocando = false; flash("fb-play", "⏸︎");
      } else {
        audio.play().then(() => { tocando = true; }); flash("fb-play", "▶︎");
      }
    }

    audio.addEventListener("ended", () => carregarE(indice + 1));

    // ── Feedback visual ────────────────────────────────────────────────────

    const timers = {};
    function flash(id, icon) {
      const el = document.getElementById(id);
      el.textContent = icon;
      el.style.opacity = 1;
      clearTimeout(timers[id]);
      timers[id] = setTimeout(() => { el.style.opacity = 0; }, 650);
    }

    // ── Controlo das zonas ─────────────────────────────────────────────────

    let bloqueado = false;

    function acaoDaZona(action) {
      if (bloqueado) return;
      bloqueado = true;
      setTimeout(() => { bloqueado = false; }, 400);

      if (primeiroClique) {
        primeiroClique = false;
        audio.play().then(() => { tocando = true; }).catch(() => {});
        fecharTutorial();
        return;
      }
      action();
    }

    document.getElementById("zone-prev").addEventListener("click", () => acaoDaZona(anterior));
    document.getElementById("zone-play").addEventListener("click", () => acaoDaZona(pausePlay));
    document.getElementById("zone-next").addEventListener("click", () => acaoDaZona(proximo));

    // ── Tutorial (primeira visita) ─────────────────────────────────────────

    function fecharTutorial() {
      tutorial.style.opacity = 0;
      setTimeout(() => { tutorial.style.display = "none"; }, 800);
    }

    if (!localStorage.getItem("tuto_v2")) {
      localStorage.setItem("tuto_v2", "1");
      requestAnimationFrame(() => tutorial.classList.add("visivel"));
      setTimeout(fecharTutorial, 4000);
    }

    // ── Tela de rotação (só na primeira visita) ────────────────────────────

    const rotacaoVista = localStorage.getItem("rotacao_v1");

    function checarOrientacao() {
      if (rotacaoVista) { girar.style.display = "none"; return; }
      const isMobile = navigator.maxTouchPoints > 0 || window.innerWidth <= 1024;
      const isRetrato = window.innerHeight > window.innerWidth;
      if (isMobile && isRetrato) {
        girar.style.display = "flex";
      } else {
        girar.style.display = "none";
        if (isMobile) localStorage.setItem("rotacao_v1", "1");
      }
    }

    checarOrientacao();
    window.addEventListener("resize", checarOrientacao);

    // ── Autoplay inicial ───────────────────────────────────────────────────

    audio.src = musicas[0];
    audio.play()
      .then(() => { tocando = true; primeiroClique = false; fecharTutorial(); })
      .catch(() => { /* bloqueado — primeiro toque inicia */ });

    // ── Media Session (tela de bloqueio) ──────────────────────────────────

    function syncMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "Piste " + (indice + 1)
      });
      navigator.mediaSession.setActionHandler("previoustrack", anterior);
      navigator.mediaSession.setActionHandler("nexttrack",     proximo);
      navigator.mediaSession.setActionHandler("play",  () => { audio.play(); tocando = true; });
      navigator.mediaSession.setActionHandler("pause", () => { audio.pause(); tocando = false; });
    }

    syncMediaSession();
  </script>

</body>
</html>
